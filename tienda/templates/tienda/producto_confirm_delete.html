{% extends 'base.html' %}

{% block title %}Eliminar producto | M8 Ecommerce{% endblock %}

{% block content %}

<div class="card border-danger">
    <div class="card-body">
        <h1 class="h4 text-danger">Eliminar producto</h1>

        <p>¿Está seguro de eliminar el producto <strong>{{ producto.nombre }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'admin_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>

{% endblock %}
